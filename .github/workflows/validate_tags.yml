name: Validate Release Tag
on:
  push:
    tags:
      - 'v*'   # ne valide que les tags qui commencent par v, ex: v1.0.0

permissions:
  contents: read

jobs:
  validate:
    name: Build & Test on Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 25
          distribution: temurin

      - name: Build, Test & PMD
        run: mvn clean test 