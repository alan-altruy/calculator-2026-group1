name: Release Build
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Build, Test & PMD
        run: mvn clean test pmd:check

      - name: Generate JavaDoc
        run: mvn javadoc:javadoc

      - name: Prepare release-site folder
        run: |
          mkdir -p release-site/${{ github.event.release.tag_name }}
          cp -r target/reports release-site/${{ github.event.release.tag_name }}/
          cp -r target/site/jacoco release-site/${{ github.event.release.tag_name }}/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./release-site