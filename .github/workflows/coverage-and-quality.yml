name: Jacoco/PMD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  checks: write
  pull-requests: write  # pour poster le commentaire dans la PR

jobs:
  coverage-quality:
    name: Run Coverage & PMD Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build and run tests
        run: mvn -B verify --file pom.xml

      - name: Generate JaCoCo badges
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2.12.1
        with:
          generate-coverage-badge: true
          generate-branches-badge: true
          generate-summary: true

      - name: Run PMD
        id: pmd
        uses: pmd/pmd-github-action@v2
        with:
          rulesets: 'category/java/errorprone.xml'
          sourcePath: 'src/main/java'
          analyzeModifiedFilesOnly: false

      - name: Upload badges as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badges
          path: '*.svg'

      - name: Comment coverage & PMD summary on PR
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          NEWLINE=$'\n'
          COVERAGE="${{ steps.jacoco.outputs.coverage }}%"
          BRANCHES="${{ steps.jacoco.outputs.branches }}%"
          PMD_VIOLATIONS=$(cat pmd-report.sarif | jq '.runs[0].results | length')
          BODY="## CI Coverage & PMD Summary${NEWLINE}* __Coverage:__ ${COVERAGE}${NEWLINE}* __Branch coverage:__ ${BRANCHES}${NEWLINE}* __PMD violations:__ ${PMD_VIOLATIONS}"
          gh pr comment ${{ github.event.pull_request.number }} -b "${BODY}"
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}