name: CodeQL
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '42 1 * * 2'

permissions:
  contents: read

jobs:
  build:
    name: Compiling and Security Scanning
    runs-on: ubuntu-latest  
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd      
    - name: Set up with Java 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
      with:
        distribution: 'temurin'
        java-version: 25
        cache: 'maven'

    - name: Initialize CodeQL for security scanning
      uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
      with:
        languages: 'java-kotlin'
        
    - name: Compile Java source code with Maven
      run: mvn -B compile --file pom.xml
      # unit tests are not run as part of this workflow, since they are not required for the CodeQL security analysis

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
      with:
        category: "/language:java-kotlin"
        


