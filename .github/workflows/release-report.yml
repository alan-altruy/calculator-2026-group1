name: Release Build
permissions:
  contents: write
on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Build, Test & PMD
        run: mvn clean test pmd:pmd

      - name: Generate JavaDoc
        run: mvn javadoc:javadoc

      - name: Prepare release-site folder
        run: |
          TAG=${GITHUB_REF##*/}
          mkdir -p release-site/$TAG
          cp -r target/reports release-site/$TAG/
          cp -r target/site/jacoco release-site/$TAG/
          cp -r target/reports/apidocs release-site/$TAG/

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:          
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          asset_content_type: application/zip
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-site/${{ github.ref_name }}
          asset_name: release-site-${{ github.ref_name }}.zip
 