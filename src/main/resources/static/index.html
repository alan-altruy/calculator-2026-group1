<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://unpkg.com/vue@3"></script>

    <link rel="stylesheet" href="/style.css">
</head>
<body>
<!-- From Uiverse.io by alexruix -->
<div class="input-group">
    <input type="email" class="input" id="Email" name="Email" placeholder="Write your computation" autocomplete="off">
    <input class="button--submit" value="Compute" type="submit">
</div>


<div class="number">
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>0</button>
    <button>.</button>
    <button>+/-</button>
</div>

<div class="opbase">
    <button>+</button>
    <button>-</button>
    <button>×</button>
    <button>/</button>
    <button>(</button>
    <button>)</button>
    <button>x²</button>
    <button>x³</button>
    <button>10^x</button>
    <button>n^x</button>
    <button>2^x</button>
    <button>√</button>
</div>

<div class="special">
    <button>π</button>
    <button>e</button>
    <button>φ</button>
    <button>i</button>
</div>

<div class="otherop">
    <button>e^x</button>
    <button>ln</button>
    <button>log</button>
    <button>1/x</button>
    <button>|x|</button>
    <button>x!</button>
    <button>sin</button>
    <button>arcsin</button>
    <button>cos</button>
    <button>arccos</button>
    <button>tg</button>
    <button>arctg</button>
</div>

</body>
</html>
