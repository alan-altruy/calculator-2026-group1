name: Release Build
on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Build, Test & PMD
        run: mvn clean test pmd:pmd

      - name: Generate JavaDoc
        run: mvn javadoc:javadoc

      - name: Prepare release-site folder
        run: |
          TAG=${GITHUB_REF##*/}
          mkdir -p release-site/$TAG
          cp -r target/reports release-site/$TAG/
          cp -r target/site/jacoco release-site/$TAG/
          cp -r target/reports/apidocs release-site/$TAG/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./release-site

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
 