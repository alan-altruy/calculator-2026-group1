name: Release Build
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write
    name: Report on Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          java-version: 25
          distribution: temurin

      - name: Build, Test & PMD
        run: mvn clean test pmd:pmd

      - name: Generate JavaDoc
        run: mvn javadoc:javadoc

      - name: Generate Jacoco report
        run: mvn jacoco:report

      - name: Zip PMD
        run: |
          cd target/reports/pmd
          zip -r ../../../pmd.zip ./*

      - name: Zip JavaDoc
        run: |
          cd target/reports/apidocs
          zip -r ../../../apidocs.zip ./*

      - name: Zip Jacoco
        run: |
          cd target/site/jacoco
          zip -r ../../../jacoco.zip ./*
      
      - name: Zip surefire-reports
        run: |
          cd target/surefire-reports
          zip -r ../../surefire-reports.zip ./*

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: |
            pmd.zip
            apidocs.zip
            jacoco.zip
            surefire-reports.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create JAR file
        run: mvn clean package spring-boot:repackage

      - name: Upload JAR to AlwaysData with password authentication
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -p "$ALWAYSDATA_PASSWORD" scp -o StrictHostKeyChecking=no \
            target/calculator-cucumber-*.jar \
            $ALWAYSDATA_USER@$ALWAYSDATA_HOST:~/calculator.jar
        env: 
          ALWAYSDATA_PASSWORD: ${{ secrets.ALWAYSDATA_PASSWORD }}
          ALWAYSDATA_USER: ${{ secrets.ALWAYSDATA_USER }}
          ALWAYSDATA_HOST: ${{ secrets.ALWAYSDATA_HOST }}