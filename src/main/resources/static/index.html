<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://unpkg.com/vue@3"></script>

    <link rel="stylesheet" href="/style.css">
</head>
<body>
<!-- From Uiverse.io by alexruix -->
<div class="input-group">
    <input type="email" class="input" id="Email" name="Email" placeholder="Write your computation" autocomplete="off">
    <input class="button--submit" value="Compute" type="submit">
</div>


<div class="number">
    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>0</button>
    <button>.</button>
    <button>=</button>
</div>

<div class="opbase">
    <button>+</button>
    <button>-</button>
    <button>*</button>
    <button>/</button>
    <button>//</button>
    <button>%</button>
    <button>^n</button>
    <button>√</button>
    <button>^2</button>
    <button>10^</button>
</div>

<div class="special">
    <button>π</button>
    <button>e</button>
    <button>φ</button>
    <button>ψ</button>
</div>
</body>
</html>
