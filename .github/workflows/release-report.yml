name: Release Build
on:
  release:
    types: [published]

permissions:
  contents: write   # required to upload release assets

jobs:
  build:
    name: Report on Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Build, Test & PMD
        run: mvn clean test pmd:pmd

      - name: Generate JavaDoc
        run: mvn javadoc:javadoc

      - name: Generate Jacoco report
        run: mvn jacoco:report

      - name: Zip PMD
        run: |
          cd target/reports/pmd
          zip -r ../../../pmd.zip ./*

      - name: Zip JavaDoc
        run: |
          cd target/reports/apidocs
          zip -r ../../../apidocs.zip ./*

      - name: Zip Jacoco
        run: |
          cd target/site/jacoco
          zip -r ../../../jacoco.zip ./*
      
      - name: Zip surefire-reports
        run: |
          cd target/surefire-reports
          zip -r ../../surefire-reports.zip ./*

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          files: |
            pmd.zip
            apidocs.zip
            jacoco.zip
            surefire-reports.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create JAR file
        run: mvn clean package spring-boot:repackage

      - name: Upload JAR to AlwaysData with password authentication
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.ALWAYSDATA_PASSWORD }}" scp -o StrictHostKeyChecking=no \
            target/target/calculator-cucumber-*.jar \
            ${{ secrets.ALWAYSDATA_USER }}@${{ secrets.ALWAYSDATA_HOST }}:~/apps/calculator.jar