name: Validate Release Tag
on:
  push:
    tags:
      - 'v*'   # ne valide que les tags qui commencent par v, ex: v1.0.0

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Build, Test & PMD
        run: mvn clean test 