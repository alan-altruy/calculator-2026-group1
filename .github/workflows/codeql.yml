name: CodeQL
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '42 1 * * 2'

permissions:
  contents: read

jobs:
  build:
    name: Compiling and Security Scanning
    runs-on: ubuntu-latest  
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0      
    - name: Set up with Java 25
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
      with:
        distribution: 'temurin'
        java-version: 25
        cache: 'maven'

    - name: Initialize CodeQL for security scanning
      uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
      with:
        languages: 'java-kotlin'
        
    - name: Compile Java source code with Maven
      run: mvn -B compile --file pom.xml
      # unit tests are not run as part of this workflow, since they are not required for the CodeQL security analysis

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
      with:
        category: "/language:java-kotlin"
        


